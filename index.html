<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <title>LABO - Estágio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Assets\favicon.ico">
  </head>
  <body>
    <header class="header">
      <!-- Logo do LABO -->
      <img class="logo" src="Assets/logo_2x.png" alt="LABO">
    </header>

    <main>
      <!-- Barra superior com título e botão de cadastro -->
      <div class="top-bar">
        <h1>Exames</h1>
        <button id="openModal">Cadastrar</button>
      </div>
      
      <!-- Modal para cadastro de novos exames -->
      <div id="modal" class="modal">
        <div class="modal-content">
          <span class="close">&times;</span>
          <h2>Cadastrar Novo Exame</h2>
          <form id="examForm">
            <label for="name">Nome:</label>
            <input type="text" id="name" name="name" placeholder="Digite o Nome" required>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" placeholder="Digite o CPF" required>

            <label for="exam">Exame:</label>
            <input type="text" id="exam" name="exam" placeholder="Digite o Exame" required>

            <label for="status">Status:</label>
            <select id="status" name="status" required>
              <option value="Pendente">Pendente</option>
              <option value="Concluído">Concluído</option>
            </select>

            <button type="submit">Cadastrar</button>
          </form>
        </div>
      </div>

      <!-- Tabela para exibir os exames cadastrados -->
      <table id="examTable">
        <thead>
          <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Exame</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          
        </tbody>
      </table>
    </main>

    <script src="script.js"></script>
  </body>
</html>
